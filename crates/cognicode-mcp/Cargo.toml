[package]
name = "cognicode-mcp"
description = "CogniCode MCP Server"
version.workspace = true
edition.workspace = true
authors.workspace = true

[[bin]]
name = "cognicode-mcp"
path = "src/main.rs"

[[bin]]
name = "mcp-client"
path = "src/mcp_client.rs"

[features]
# Forward the `sqlite` feature to `cognicode-db` and `cognicode-core`.
# Default is empty — rusqlite is opt-in via the `sqlite` feature.
default = []
sqlite = ["cognicode-db/sqlite", "cognicode-core/sqlite"]
# Forwarded to `cognicode-core` so MCP handlers can use PostgreSQL.
postgres = ["cognicode-core/postgres"]
# `multimodal` is an opt-in feature that enables the multimodal MCP
# tools (`docs_ingest`, `graph_search`). Off by default.
multimodal = ["cognicode-core/multimodal"]

[dependencies]
cognicode-core = { workspace = true }
cognicode-diagram = { path = "../cognicode-diagram" }
cognicode-db = { path = "../cognicode-db" }
tokio.workspace = true
serde.workspace = true
serde_json.workspace = true
anyhow.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
rmcp.workspace = true
process-wrap.workspace = true
opentelemetry.workspace = true
opentelemetry_sdk.workspace = true
opentelemetry-otlp.workspace = true
clap.workspace = true
rayon.workspace = true
