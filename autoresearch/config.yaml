# Self-Evolving Rules System — Configuration

loop:
  max_iterations: 10           # Stop after N iterations (MVP)
  timeout_per_iteration_secs: 300  # 5 minutes max per iteration
  cooldown_between_iterations_secs: 5

corpus:
  directory: autoresearch/corpus
  pinned_commits_file: corpus_commits.yaml
  exclude_patterns:
    - "*_test.*"
    - "*.test.*"
    - "*.min.js"
    - "*.bundle.js"
    - "vendor/"
    - "node_modules/"
    - "target/"
    - "dist/"
    - "build/"
    - "*.pb.go"
    - "*.g.cs"

evaluation:
  tools:
    rust:
      primary: clippy       # cargo clippy --message-format=json
      secondary: cognicode  # cognicode analyze
      tertiary: sonarqube   # sonar-scanner
    python:
      primary: ruff         # ruff check --output-format=json
      secondary: pylint     # pylint --output-format=json
      tertiary: cognicode
    javascript:
      primary: eslint       # eslint --format=json
      secondary: sonarqube
      tertiary: cognicode
    typescript:
      primary: tseslint
      secondary: sonarqube
      tertiary: cognicode
    java:
      primary: sonarqube
      secondary: spotbugs
      tertiary: cognicode
    go:
      primary: staticcheck
      secondary: golangci-lint
      tertiary: cognicode

  consensus:
    min_tools_agreeing: 2   # At least 2 tools must agree for "Likely TP"
    strong_tp_threshold: 3  # All 3 tools agree → "Strong TP"
    location_tolerance: 1   # ±1 line for matching

  tool_weights:
    sonarqube: 0.30
    eslint: 0.25
    clippy: 0.25
    ruff: 0.25
    cognicode: 0.20
    spotbugs: 0.15
    staticcheck: 0.15

decision:
  health_score_weights:
    f1: 0.35
    snr: 0.25
    res: 0.20
    dar: 0.10
    cost: 0.10

  thresholds:
    min_f1_improvement: 0.01       # ΔF1 must be > this to consider KEEP
    max_fpr_increase: 0.05          # ΔFPR must be < this to consider KEEP
    max_execution_time_increase_pct: 20  # Max 20% slower to KEEP
    health_score_keep: 0.80         # ≥ 0.80 = healthy KEEP
    health_score_discard: 0.40      # < 0.40 = discard candidate

  # SOLID + Clean Code scoring
  solid_score_weights:
    srp: 0.30    # Single Responsibility (own file = 1, shared = 0)
    ocp: 0.25    # Open/Closed (configurable params = 1)
    lsp: 0.20    # Liskov (all trait methods valid = 1)
    isp: 0.10    # Interface Segregation (minimal imports = 1)
    dip: 0.15    # Dependency Inversion (uses RuleContext = 1)
  
  # When to prioritize code quality over metrics
  segregation_always_keep: true        # Extracting to own file is ALWAYS a KEEP
  simplification_keep_threshold: 0.20  # ≥20% fewer lines → KEEP (same metrics)
  solid_improvement_keep: true         # Any SOLID score increase → KEEP (no regression)
  
  # Clean Code thresholds
  max_check_body_lines: 50             # Warn if check() > 50 lines
  max_imports: 5                       # Warn if > 5 specific imports
  min_doc_lines: 3                     # Warn if < 3 doc comment lines
  
  edge_cases:
    broken_rule_recovery: true      # F1: 0→N is always a KEEP
    security_rules_never_discard: true  # P0 security rules always improve, never discard
    new_rule_grace_period_days: 90  # Conservative thresholds for young rules

rust:
  catalog_path: crates/cognicode-axiom/src/rules/catalog.rs
  check_timeout_secs: 120
  test_timeout_secs: 600

storage:
  sqlite_path: autoresearch/metrics.db
  evolution_log: autoresearch/evolution.tsv
  results_dir: autoresearch/results
  baseline_dir: autoresearch/baseline

alerts:
  anomaly_precision_drop_pct: 20    # >20% drop in precision triggers alert
  anomaly_recall_drop_pct: 15       # >15% drop in recall triggers alert
  anomaly_fpr_spike_multiplier: 5   # >5x historical FPR triggers alert
  consecutive_failures: 5           # >5 consecutive failures → pause

# ═══════════════════════════════════════════════════════════════════
# Model Configuration (MiniMax M2.7 HighSpeed)
# ═══════════════════════════════════════════════════════════════════

model:
  provider: minimax                  # Anthropic-compatible API
  model: MiniMax-M2.7-highspeed
  base_url: ${ANTHROPIC_BASE_URL}    # From environment
  auth_token: ${ANTHROPIC_AUTH_TOKEN} # From environment (JWT Bearer)
  max_tokens: 8192
  temperature: 0.3                   # Low for code editing precision
  timeout_ms: 300000                 # 5 minutes
  
  agent_models:
    analyzer: MiniMax-M2.7-highspeed
    improver: MiniMax-M2.7-highspeed
    evaluator: MiniMax-M2.7-highspeed
    decider: MiniMax-M2.7-highspeed

# ═══════════════════════════════════════════════════════════════════
# Rule Segregation Configuration
# ═══════════════════════════════════════════════════════════════════

segregation:
  enabled: true
  rules_dir: crates/cognicode-axiom/src/rules/rules
  naming_convention: "{rule_id}_{short_name}.rs"  # e.g., s2068_hardcoded_credentials.rs
  directory_structure:
    rust:
      security: rules/rust/security/
      code_smells: rules/rust/code_smells/
      bugs: rules/rust/bugs/
      performance: rules/rust/performance/
      style: rules/rust/style/
    python:
      security: rules/python/security/
      code_smells: rules/python/code_smells/
    javascript:
      security: rules/javascript/security/
      code_smells: rules/javascript/code_smells/
      es6: rules/javascript/es6/
      react: rules/javascript/react/
      node: rules/javascript/node/
    java:
      security: rules/java/security/
      code_smells: rules/java/code_smells/
    go:
      security: rules/go/security/
      code_smells: rules/go/code_smells/
  
  auto_registry: true                # Auto-generate registry.rs after segregation
  backward_compat: true              # Keep re-exports in catalog.rs
