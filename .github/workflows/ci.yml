name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    # PR 3 of postgres-default-config: spin up a postgres:16 service
    # container so the workspace's PG tests (gated on TEST_DATABASE_URL)
    # have a real database to connect to. SQLite tests stay opt-in
    # via `--features sqlite` on the explorer crate.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: cognicode
          POSTGRES_PASSWORD: cognicode
          POSTGRES_DB: cognicode
        ports:
          - 5432:5432
        # The official postgres image ships `pg_isready` in /usr/bin.
        # We probe with the same credentials the test uses.
        options: >-
          --health-cmd "pg_isready -U cognicode -d cognicode"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      # Tests read this to decide whether to run PG assertions or
      # skip cleanly. localhost works because the service port is
      # mapped to the host network namespace.
      TEST_DATABASE_URL: postgres://cognicode:cognicode@localhost:5432/cognicode
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Detect changed files
        if: github.event_name == 'pull_request'
        id: changed
        uses: tj-actions/changed-files@v45
        with:
          files: |
            **/*.rs
            **/Cargo.toml
            **/Cargo.lock
            .github/workflows/*.yml
      - name: Format check
        # Workspace-wide check. Pre-existing format debt was paid down
        # in PR #20 (`chore(fmt): fix pre-existing workspace format debt`).
        # Future PRs are expected to keep this clean.
        run: cargo fmt --all -- --check
      - name: Clippy (deny warnings)
        # On PRs: strict `-D warnings` only on crates with files changed
        # in this PR. The full workspace check still runs (so pre-existing
        # warnings surface as annotations) but exit 0 is required only
        # for the changed-crate subset. This lets new work ship without
        # first paying down accumulated clippy debt across the codebase.
        run: |
          set -e
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED_CRATES=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD" \
              | grep -E '^crates/' \
              | cut -d/ -f2 \
              | sort -u \
              || true)
            if [ -n "$CHANGED_CRATES" ]; then
              echo "Strict clippy (-D warnings) on changed crates:"
              echo "$CHANGED_CRATES"
              PKGS=$(echo "$CHANGED_CRATES" | sed 's/^/-p /' | tr '\n' ' ')
              # shellcheck disable=SC2086
              cargo clippy $PKGS --all-targets -- -D warnings
            else
              echo "No crates changed; skipping strict clippy"
            fi
            # Always also surface workspace-wide warnings as annotations
            # (no -D warnings so the build doesn't fail on pre-existing).
            echo "---"
            echo "Workspace-wide clippy (non-strict, annotation only):"
            cargo clippy --workspace --all-targets --message-format=short || true
          else
            cargo clippy --workspace --all-targets -- -D warnings
          fi
      - name: Check
        run: cargo check --workspace --all-targets
      - name: Test
        # Default build (postgres-first). The workspace test suite
        # gates PG-only assertions on TEST_DATABASE_URL (the service
        # container above), and the sqlite feature was removed from
        # the explorer crate in the Graph Intelligence v2 cleanup.
        run: cargo test --workspace
      - name: Build
        run: cargo build --release

  explorer-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "apps/explorer-ui/package-lock.json"
      - name: Install deps
        working-directory: apps/explorer-ui
        run: npm ci
      - name: Lint
        working-directory: apps/explorer-ui
        run: npm run lint
      - name: Type-check + Build
        working-directory: apps/explorer-ui
        run: npm run build
      - name: Bundle budget gate (gzipped JS < 200KB)
        working-directory: apps/explorer-ui
        run: npm run build:check-bundle
      - name: Unit tests
        working-directory: apps/explorer-ui
        run: npm test
      - name: Install Playwright browsers
        working-directory: apps/explorer-ui
        run: npx playwright install --with-deps chromium
      - name: E2E functional tests
        working-directory: apps/explorer-ui
        run: npm run test:e2e:functional
        env:
          CI: "true"

  pr-check:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      # `cognicode-quality` was PARKED (see workspace Cargo.toml line 12-14).
      # The PR check script falls back gracefully when the binary is absent
      # (line 27: `|| echo '{"error": "analysis failed"}'`), so the script
      # continues to surface "0 blockers" for every PR until the crate is
      # re-enabled by a future cycle.
      - name: PR Quality Check
        run: bash scripts/pr-check.sh

  # M2.12: MCP smoke gate. Minimal job — `cargo build` + `cargo test`
  # on the libraries the MCP server touches, plus a `--help` smoke
  # against the existing `scripts/mcp/mcp_smoke_all.py` to catch
  # argument regressions. The full e2e smoke (which spins up the
  # server and calls `mcp_smoke_all.py` against it) requires a live
  # PG instance and is run manually as part of the release checklist
  # — see `docs/operations/mcp-server-runbook.md`. The smoke script
  # itself has its own PR-time check in M2.11 (annotations integrity).
  mcp-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Build MCP server
        # Build the `cognicode-mcp` (stdio) bin and the
        # `cognicode-mcp-server` HTTP/SSE bin (with the `postgres`
        # feature so the HandlerContext resolves). We build, not test,
        # because the server bin's test build is currently blocked by
        # a pre-existing opentelemetry-prometheus 0.27 import bug
        # tracked separately; the M3.5 lib tests run on the
        # `cognicode_core` suite (which has its own test job above).
        run: |
          cargo build -p cognicode-mcp --release
          cargo build -p cognicode-mcp-server --release --features postgres
      - name: Core lib tests
        # The dispatch boundary in cognicode-core is the production
        # code path; the auth-middleware unit tests in
        # `cognicode_mcp::auth` are gated on the same lib build.
        run: cargo test -p cognicode-core --lib
      - name: MCP smoke script help check
        # Lint the smoke script's argument surface so a typo in
        # `--help` flags is caught at PR time. The actual e2e
        # smoke needs a live PG + live server, which is not viable
        # in CI without a postgres service container — see the
        # runbook for the manual flow.
        run: python3 scripts/mcp/mcp_smoke_all.py --help
