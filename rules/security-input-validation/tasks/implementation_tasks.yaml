# Implementation Tasks: security-input-validation batch
# Generated: 2026-05-14
# Rules: 14 (CRITICAL: 5, MAJOR: 7, Minor: 2)

rules:

  # ═══════════════════════════════════════════════════════════════════════════════
  # CRITICAL RULES
  # ═══════════════════════════════════════════════════════════════════════════════

  - rule_id: sqli-string-concat
    severity: CRITICAL
    cwe: CWE-89
    file_path: crates/cognicode-axiom/src/rules/rules/rust/security/input_validation/sqli_string_concat.rs
    detection_strategy: |
      Use tree-sitter query to detect function calls matching database query patterns
      where string concatenation/interpolation is used in query arguments.
    implementation_tasks:
      - Create SqliStringConcatRule struct implementing Rule trait
      - Implement required_keywords() preflight: [query, execute, sql, format, format!]
      - Implement check() with tree-sitter query for call_expression with sql/execute
      - Detect binary_expression with operator::+ inside query arguments
      - Skip if query uses ? or $1/$2 parameter placeholders
      - Add false_positive_guards: parameterized queries, constant strings, logging
      - Write unit tests: 3 positives, 5 negatives, 2 edge cases
      - Register in input_validation/mod.rs and security/mod.rs
    test_tasks:
      - Test: FP-001 format!("SELECT * FROM users WHERE id = {}", id)
      - Test: FP-002 format!("INSERT INTO logs VALUES ('{}', '{}')", user, msg)
      - Test: FP-003 Multi-statement query with push_str
      - Negative: FN-001 parameterized query with $1
      - Negative: FN-002 constant SQL string
      - Negative: FN-003 logging format, not SQL
      - Negative: FN-004 test module code
      - Negative: FN-005 sanitized input
      - Edge: EC-001 nested format calls
      - Edge: EC-002 query via macro
    benchmark_tasks:
      - Benchmark on corpus (50+ files with SQL patterns)
      - Verify < 1ms per file (layer 1 budget)
      - Profile tree-sitter query performance

  - rule_id: command-injection-shell
    severity: CRITICAL
    cwe: CWE-78
    file_path: crates/cognicode-axiom/src/rules/rules/rust/security/input_validation/command_injection_shell.rs
    detection_strategy: |
      Use tree-sitter query to detect Command::new or process spawning functions
      where arguments include string formatting with user input.
    implementation_tasks:
      - Create CommandInjectionShellRule struct implementing Rule trait
      - Implement required_keywords() preflight: [Command, new, exec, popen, system, sh, bash, cmd]
      - Implement check() with tree-sitter query for Command::new with format!
      - Detect call_expression to std::process::Command
      - Skip if using .arg() method (safe pattern)
      - Add false_positive_guards: .arg() usage, constant args, validated input
      - Write unit tests: 3 positives, 4 negatives, 2 edge cases
      - Register in input_validation/mod.rs and security/mod.rs
    test_tasks:
      - Test: FP-001 Command::new(&format!("rm -rf {}", path))
      - Test: FP-002 std::process::Command::new("sh").arg("-c").arg(&format!(...))
      - Test: FP-003 Command built from user-controlled base path
      - Negative: FN-001 Command::new("ls").arg(user_path) - safe .arg()
      - Negative: FN-002 constant arguments
      - Negative: FN-003 pre-validated command
      - Negative: FN-004 test code
      - Edge: EC-001 multiple format args
      - Edge: EC-002 args() with user vector
    benchmark_tasks:
      - Benchmark on corpus (50+ files with Command patterns)
      - Verify < 1ms per file (layer 1 budget)
      - Profile tree-sitter query performance

  - rule_id: path-traversal
    severity: CRITICAL
    cwe: CWE-22
    file_path: crates/cognicode-axiom/src/rules/rules/rust/security/input_validation/path_traversal.rs
    detection_strategy: |
      Use tree-sitter query to detect file path operations where user input
      is joined with paths without proper validation of ../ sequences.
    implementation_tasks:
      - Create PathTraversalRule struct implementing Rule trait
      - Implement required_keywords() preflight: [open, read, write, Path, join, canonicalize, from, user, input]
      - Implement check() with tree-sitter query for fs operations with format!
      - Detect File::open, std::fs::read, Path::new with string concat
      - Skip if canonicalize() and starts_with() check present
      - Add false_positive_guards: canonicalize with bounds check, whitelist validation
      - Write unit tests: 3 positives, 4 negatives, 2 edge cases
      - Register in input_validation/mod.rs and security/mod.rs
    test_tasks:
      - Test: FP-001 File::open(&format!("{}/{}", dir, name))
      - Test: FP-002 std::fs::read(&format!("files/{}/{}", user_id, filename))
      - Test: FP-003 String concatenation in path construction
      - Negative: FN-001 canonicalize with starts_with check
      - Negative: FN-002 whitelist validation
      - Negative: FN-003 constant path
      - Negative: FN-004 test code
      - Edge: EC-001 nested path building
      - Edge: EC-002 PathBuf with push
    benchmark_tasks:
      - Benchmark on corpus (50+ files with path operations)
      - Verify < 1ms per file (layer 1 budget)
      - Profile tree-sitter query performance

  - rule_id: xxe
    severity: CRITICAL
    cwe: CWE-611
    file_path: crates/cognicode-axiom/src/rules/rules/rust/security/input_validation/xxe.rs
    detection_strategy: |
      Use tree-sitter query to detect XML parser configuration that enables
      external entity expansion.
    implementation_tasks:
      - Create XxeRule struct implementing Rule trait
      - Implement required_keywords() preflight: [XmlReader, Parser, Document, DTD, Entity, external, feature, set]
      - Implement check() with tree-sitter query for xml parser creation
      - Detect quick_xml::Reader::new without feature configuration
      - Skip if external entities explicitly disabled
      - Add false_positive_guards: DTD disabled, safe config preset
      - Write unit tests: 2 positives, 3 negatives, 1 edge case
      - Register in input_validation/mod.rs and security/mod.rs
    test_tasks:
      - Test: FP-001 XmlReader::new(input) without features
      - Test: FP-002 Parser::from_reader with no DTD restrictions
      - Negative: FN-001 features explicitly disabled
      - Negative: FN-002 using serde_json instead
      - Negative: FN-003 test environment
      - Edge: EC-001 feature set after creation
    benchmark_tasks:
      - Benchmark on corpus (30+ files with XML parsing)
      - Verify < 1ms per file (layer 1 budget)
      - Profile tree-sitter query performance

  - rule_id: insecure-deserialization
    severity: CRITICAL
    cwe: CWE-502
    file_path: crates/cognicode-axiom/src/rules/rules/rust/security/input_validation/insecure_deserialization.rs
    detection_strategy: |
      Use tree-sitter query to detect deserialization of untrusted data
      using formats known to be unsafe (bincode, MessagePack, etc.).
    implementation_tasks:
      - Create InsecureDeserializationRule struct implementing Rule trait
      - Implement required_keywords() preflight: [deserialize, from_slice, from_str, bincode, yaml, serde, MessagePack, rmp]
      - Implement check() with tree-sitter query for deserialize calls
      - Detect bincode::deserialize, serde_yaml::from_str, rmp_serde calls
      - Skip if using serde_json (safe) or trusted source
      - Add false_positive_guards: serde_json, trusted source, integrity check
      - Write unit tests: 3 positives, 4 negatives, 2 edge cases
      - Register in input_validation/mod.rs and security/mod.rs
    test_tasks:
      - Test: FP-001 bincode::deserialize::<Config>(&user_data)
      - Test: FP-002 serde_yaml::from_str(&user_yaml)?
      - Test: FP-003 rmp_serde::from_read(user_stream)?
      - Negative: FN-001 serde_json from user (safe)
      - Negative: FN-002 trusted internal source
      - Negative: FN-003 integrity check before deserialize
      - Negative: FN-004 test with known data
      - Edge: EC-001 nested deserialization
      - Edge: EC-002 deserialization into trait object
    benchmark_tasks:
      - Benchmark on corpus (40+ files with deserialization)
      - Verify < 1ms per file (layer 1 budget)
      - Profile tree-sitter query performance

  # ═══════════════════════════════════════════════════════════════════════════════
  # MAJOR RULES
  # ═══════════════════════════════════════════════════════════════════════════════

  - rule_id: ldap-injection
    severity: MAJOR
    cwe: CWE-90
    file_path: crates/cognicode-axiom/src/rules/rules/rust/security/input_validation/ldap_injection.rs
    detection_strategy: |
      Use tree-sitter query to detect LDAP query construction with string
      concatenation of user input without proper escaping.
    implementation_tasks:
      - Create LdapInjectionRule struct implementing Rule trait
      - Implement required_keywords() preflight: [ldap, search, filter, find, User, dn, format]
      - Implement check() with tree-sitter query for ldap search/filter
      - Detect format! in LDAP filter construction
      - Skip if filter_escape or safe filter builder used
      - Add false_positive_guards: filter_escape, constant filter, safe builder
      - Write unit tests: 2 positives, 4 negatives, 2 edge cases
      - Register in input_validation/mod.rs and security/mod.rs
    test_tasks:
      - Test: FP-001 ldap.search(&format!("(uid={})", user))
      - Test: FP-002 Multi-step filter construction with push_str
      - Negative: FN-001 filter_escape used
      - Negative: FN-002 constant filter
      - Negative: FN-003 safe library abstraction
      - Negative: FN-004 test environment
      - Edge: EC-001 multiple user inputs in filter
      - Edge: EC-002 filter via macro
    benchmark_tasks:
      - Benchmark on corpus (20+ files with LDAP)
      - Verify < 1ms per file (layer 1 budget)
      - Profile tree-sitter query performance

  - rule_id: xpath-injection
