    file_path: crates/cognicode-axiom/src/rules/rules/rust/security/input_validation/missing_input_sanitization.rs
    detection_strategy: |
      Use tree-sitter query to detect function parameters that accept
      user input without any visible validation or sanitization.
    implementation_tasks:
      - Create MissingInputSanitizationRule struct implementing Rule trait
      - Implement required_keywords() preflight: [fn, pub, user, input, request, query, param]
