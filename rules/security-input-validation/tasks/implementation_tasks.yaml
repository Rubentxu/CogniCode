    test_tasks:
      - Test: FP-001 redirect(&format!("{}/{}", base_url, user_path))
      - Test: FP-002 HttpResponse::Found().insert_header(("Location", dest))
      - Test: FP-003 user_input in Location header
      - Negative: FN-001 path-only with validation
      - Negative: FN-002 whitelist validation
      - Negative: FN-003 named route
      - Negative: FN-004 test environment
      - Edge: EC-001 protocol-relative URL
      - Edge: EC-002 double encoding
    benchmark_tasks:
