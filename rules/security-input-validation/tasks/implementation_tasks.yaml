  - rule_id: trusting-url-scheme
    severity: Minor
    cwe: CWE-829
    file_path: crates/cognicode-axiom/src/rules/rules/rust/security/input_validation/trusting_url_scheme.rs
    detection_strategy: |
      Use tree-sitter query to detect URL construction where the scheme
      is not validated (allowing http:// or ftp:// when https:// expected).
    implementation_tasks:
      - Create TrustingUrlSchemeRule struct implementing Rule trait
      - Implement required_keywords() preflight: [Url, parse, url, scheme, http, https, ftp, format]
      - Implement check() with tree-sitter query for URL construction
      - Detect Url::parse without scheme validation
      - Skip if scheme checked or require_https used
      - Add false_positive_guards: scheme validated, trusted source, static URL
      - Write unit tests: 3 positives, 4 negatives, 2 edge cases
      - Register in input_validation/mod.rs and security/mod.rs
    test_tasks:
