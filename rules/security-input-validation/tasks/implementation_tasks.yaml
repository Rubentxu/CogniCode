    implementation_tasks:
      - Create XpathInjectionRule struct implementing Rule trait
      - Implement required_keywords() preflight: [xpath, evaluate, query, select, Node, Document, format]
      - Implement check() with tree-sitter query for xpath evaluation
      - Detect format! in XPath expression construction
      - Skip if parameterized/prepared XPath or validated input
      - Add false_positive_guards: prepared statements, constant, validated input
      - Write unit tests: 3 positives, 4 negatives, 1 edge case
      - Register in input_validation/mod.rs and security/mod.rs
    test_tasks:
      - Test: FP-001 xpath.evaluate(&format!(".//{}", tag))
      - Test: FP-002 format!("//user[@name='{}']", user_name)
