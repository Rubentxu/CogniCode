  - rule_id: integer-overflow-size
    severity: MAJOR
    cwe: CWE-190
    file_path: crates/cognicode-axiom/src/rules/rules/rust/security/input_validation/integer_overflow_size.rs
    detection_strategy: |
      Use tree-sitter query to detect arithmetic on size/length values
      without overflow checking.
    implementation_tasks:
      - Create IntegerOverflowSizeRule struct implementing Rule trait
      - Implement required_keywords() preflight: [len, size, capacity, Vec, vec, new, with_capacity, read, malloc, allocate]
      - Implement check() with tree-sitter query for size arithmetic
      - Detect vec![], with_capacity with unchecked arithmetic
      - Skip if checked_add, checked_mul, or validation present
      - Add false_positive_guards: checked operations, validated input, constant
      - Write unit tests: 3 positives, 4 negatives, 2 edge cases
      - Register in input_validation/mod.rs and security/mod.rs
    test_tasks:
      - Test: FP-001 vec![0u8; a.len() * b.len()]
      - Test: FP-002 Vec::resize(old_size + user_input, 0)
      - Test: FP-003 capacity from user-controlled collection
      - Negative: FN-001 checked_mul used
      - Negative: FN-002 validated input
      - Negative: FN-003 constant
      - Negative: FN-004 test environment
      - Edge: EC-001 chained operations
      - Edge: EC-002 size from deserialization
    benchmark_tasks:
