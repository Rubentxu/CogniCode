      - Test: FP-002 format!("{}://{}", user_scheme, user_host)
      - Test: FP-003 reqwest::get(&user_url)
      - Negative: FN-001 scheme validated
      - Negative: FN-002 require_https used
      - Negative: FN-003 static URL
      - Negative: FN-004 test environment
      - Edge: EC-001 protocol-relative URL
      - Edge: EC-002 data URL
    benchmark_tasks:
