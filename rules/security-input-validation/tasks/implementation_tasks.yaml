  - rule_id: http-response-splitting
    severity: MAJOR
    cwe: CWE-113
    file_path: crates/cognicode-axiom/src/rules/rules/rust/security/input_validation/http_response_splitting.rs
    detection_strategy: |
      Use tree-sitter query to detect HTTP header construction where
      user input could inject CRLF characters to split responses.
    implementation_tasks:
      - Create HttpResponseSplittingRule struct implementing Rule trait
      - Implement required_keywords() preflight: [header, insert_header, append, Content, format, user, input]
      - Implement check() with tree-sitter query for header insertion
      - Detect insert_header with format! or raw user input
      - Skip if newlines stripped or typed headers used
      - Add false_positive_guards: newline sanitization, constant, typed headers
      - Write unit tests: 3 positives, 4 negatives, 2 edge cases
      - Register in input_validation/mod.rs and security/mod.rs
    test_tasks:
      - Test: FP-001 insert_header("X-Greeting", format!("Hello {}", name))
      - Test: FP-002 Set-Cookie with format!
      - Test: FP-003 raw header value forwarded
      - Negative: FN-001 newlines stripped
      - Negative: FN-002 constant header
      - Negative: FN-003 typed header builder
      - Negative: FN-004 test environment
      - Edge: EC-001 unicode newlines
      - Edge: EC-002 iterating user-provided headers
    benchmark_tasks:
