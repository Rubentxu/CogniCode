      - Register in input_validation/mod.rs and security/mod.rs
    test_tasks:
      - Test: FP-001 canonicalize(user_path)? without bounds
      - Test: FP-002 Path::new(&input).components() without check
      - Test: FP-003 normalize(user_path) without verification
      - Negative: FN-001 canonicalize with starts_with check
      - Negative: FN-002 constant path
      - Negative: FN-003 whitelist validation
      - Negative: FN-004 test environment
      - Edge: EC-001 delayed verification
      - Edge: EC-002 symlink handling
    benchmark_tasks:
      - Benchmark on corpus (30+ files with path operations)
      - Verify < 1ms per file (layer 1 budget)
      - Profile tree-sitter query performance

  - rule_id: open-redirect
    severity: MAJOR
    cwe: CWE-601
    file_path: crates/cognicode-axiom/src/rules/rules/rust/security/input_validation/open_redirect.rs
    detection_strategy: |
      Use tree-sitter query to detect HTTP redirects where the destination
      URL is constructed from user input without validation.
    implementation_tasks:
      - Create OpenRedirectRule struct implementing Rule trait
      - Implement required_keywords() preflight: [redirect, location, to_url, Moved, Found, SeeOther, Permanent, format]
      - Implement check() with tree-sitter query for redirect operations
      - Detect Location header with format! or user input
      - Skip if whitelist validation or path-only redirect
      - Add false_positive_guards: whitelist, path-only, named route
      - Write unit tests: 3 positives, 4 negatives, 2 edge cases
