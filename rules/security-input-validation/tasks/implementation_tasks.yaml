common_implementation_tasks:
  - Create input_validation/mod.rs with module declarations
  - Add all 14 rules to security/mod.rs exports
  - Add all 14 rules to rules/rust/mod.rs exports
  - Ensure RuleEntry inventory registrations for all rules
  - Run cargo build to verify compilation
  - Run cargo test to verify all tests pass
  - Run cargo clippy for linting
  - Update batch state: fixtures_ready → implementing

priority_order:
  - "CRITICAL rules first: sqli-string-concat, command-injection-shell, path-traversal, xxe, insecure-deserialization"
  - "MAJOR rules second: ldap-injection, xpath-injection, xss-unsanitized-output, path-equivalence, open-redirect, http-response-splitting, integer-overflow-size"
  - "MINOR rules last: missing-input-sanitization, trusting-url-scheme"
