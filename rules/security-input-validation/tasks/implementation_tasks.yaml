      - Profile tree-sitter query performance

  - rule_id: xss-unsanitized-output
    severity: MAJOR
    cwe: CWE-79
    file_path: crates/cognicode-axiom/src/rules/rules/rust/security/input_validation/xss_unsanitized_output.rs
    detection_strategy: |
      Use tree-sitter query to detect HTML/JS output to web responses
      where user input is not sanitized.
    implementation_tasks:
      - Create XssUnsantizedOutputRule struct implementing Rule trait
      - Implement required_keywords() preflight: [Html, render, response, body, content, format, json, html]
      - Implement check() with tree-sitter query for response rendering
      - Detect format! in HttpResponse body without escape function
      - Skip if escape_html, template engine auto-escape, or JSON content-type
      - Add false_positive_guards: escape function, auto-escape, JSON response
      - Write unit tests: 3 positives, 4 negatives, 2 edge cases
      - Register in input_validation/mod.rs and security/mod.rs
    test_tasks:
      - Test: FP-001 Response::Ok().body(format!("<div>{}</div>", name))
      - Test: FP-002 format!("<script>alert('{}')</script>", msg)
      - Test: FP-003 Multiple user inputs in HTML
      - Negative: FN-001 escape_html used
      - Negative: FN-002 Json response
      - Negative: FN-003 template engine auto-escape
      - Negative: FN-004 test environment
      - Edge: EC-001 nested rendering
      - Edge: EC-002 JSON in HTML page
    benchmark_tasks:
      - Benchmark on corpus (40+ files with HTTP responses)
      - Verify < 1ms per file (layer 1 budget)
      - Profile tree-sitter query performance

  - rule_id: path-equivalence
    severity: MAJOR
    cwe: CWE-41
