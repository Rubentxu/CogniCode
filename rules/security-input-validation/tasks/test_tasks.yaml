  # ═══════════════════════════════════════════════════════════════════════════════
  # MINOR RULES
  # ═══════════════════════════════════════════════════════════════════════════════

  - rule_id: missing-input-sanitization
    cwe: CWE-20
    test_categories:
      positive_detection:
        count: 3
        tests:
          - id: FP-001
            name: No validation present
            code: |
              pub fn process_user_input(data: String) -> Result<()> {
                  store_in_db(&data)?;
                  Ok(())
              }
            expected: DETECT

          - id: FP-002
            name: Stored without sanitization
            code: |
              fn new_user(name: String, email: String) -> User {
                  User { name, email }
              }
            expected: DETECT

          - id: FP-003
            name: Passed to query
            code: |
              async fn handle(req: HttpRequest) -> Result<HttpResponse> {
                  let input = req.match_info().get("data").unwrap();
                  execute_query(input)
              }
            expected: DETECT

      negative_detection:
        count: 4
        tests:
          - id: FN-001
            name: Validated at entry
            code: |
              fn process(data: String) -> Result<()> {
                  validate_input(&data)?;
              }
            expected: NO_DETECT

          - id: FN-002
            name: Newtype pattern
            code: |
              struct UserInput(String);
              impl UserInput {
                  pub fn new(s: String) -> Result<Self> {
                      validate(&s)?;
                      Ok(UserInput(s))
                  }
              }
            expected: NO_DETECT

          - id: FN-003
            name: Validated helper
            code: |
              fn handler(input: String) {
                  process(validate_input(input)?)
              }
            expected: NO_DETECT

          - id: FN-004
            name: Test environment
            code: |
              #[test]
              fn test_helper() {
                  let r = helper("constant");
              }
            expected: NO_DETECT

      edge_cases:
        count: 2
        tests:
          - id: EC-001
            name: Partial validation
            code: |
              if data.len() > 100 { return Err(()); }
              execute(&data)
            expected: DETECT

          - id: EC-002
            name: Selective validation
            code: |
              fn create(name: String, email: String, age: u32) {
                  validate_name(&name)?;
                  store(email, age);
              }
            expected: DETECT

  - rule_id: trusting-url-scheme
    cwe: CWE-829
    test_categories:
      positive_detection:
        count: 3
        tests:
          - id: FP-001
            name: URL parsed without scheme check
            code: |
              fn fetch_resource(url_str: &str) -> Result<String> {
                  let url = Url::parse(url_str)?;
                  reqwest::get(url.as_str())?.text()
              }
            expected: DETECT

          - id: FP-002
            name: User controls scheme and host
            code: |
              let url = format!("{}://{}", user_scheme, user_host);
              reqwest::get(&url)?;
            expected: DETECT

          - id: FP-003
            name: Request to user URL
            code: |
              let resp = reqwest::get(&user_url).await?;
            expected: DETECT

      negative_detection:
        count: 4
        tests:
          - id: FN-001
            name: Scheme validated
            code: |
              let url = Url::parse(&user_url)?;
              if url.scheme() != "https" {
                  return Err(InsecureScheme);
              }
            expected: NO_DETECT

          - id: FN-002
            name: HTTPS required
            code: |
              url.require_https()?;
            expected: NO_DETECT

          - id: FN-003
            name: Static URL
            code: |
              reqwest::get("https://api.example.com/data")?
            expected: NO_DETECT

          - id: FN-004
            name: Test environment
            code: |
              #[test]
              fn test_url() {
                  Url::parse("https://example.com").unwrap();
              }
            expected: NO_DETECT

      edge_cases:
        count: 2
        tests:
          - id: EC-001
            name: Protocol-relative URL
            code: |
              format!("//{}", user_host)
            expected: DETECT

          - id: EC-002
            name: Data URL
            code: |
              format!("data:text/html,<script>{}</script>", script)
            expected: DETECT

