  - rule_id: sqli-string-concat
    cwe: CWE-89
    test_categories:
      positive_detection:
        count: 3
        tests:
          - id: FP-001
            name: Direct interpolation in SQL query
            code: |
              fn get_user(id: i32) -> Result<User> {
                  let query = format!("SELECT * FROM users WHERE id = {}", id);
                  db.execute(&query)
              }
            expected: DETECT

          - id: FP-002
            name: Multiple user inputs concatenated
            code: |
              let sql = format!("INSERT INTO logs VALUES ('{}', '{}')", user, msg);
              conn.execute(&sql)?;
            expected: DETECT

          - id: FP-003
            name: Multi-statement query construction
            code: |
              let mut q = String::new();
              q.push_str("SELECT * FROM items WHERE name = '");
              q.push_str(&user_input);
              q.push_str("'");
              execute(&q);
            expected: DETECT

      negative_detection:
        count: 5
        tests:
          - id: FN-001
            name: Parameterized query placeholder
            code: |
              let result = query!("SELECT * FROM users WHERE id = $1", user_id);
            expected: NO_DETECT

          - id: FN-002
            name: Hardcoded SQL string
            code: |
              let sql = "SELECT * FROM products ORDER BY name";
              execute(sql);
            expected: NO_DETECT

          - id: FN-003
            name: Logging format, not SQL
            code: |
              log::info!("User {} triggered action", username);
            expected: NO_DETECT

          - id: FN-004
            name: Test module code
            code: |
              #[cfg(test)]
              mod tests {
                  let sql = "SELECT 1";
              }
            expected: NO_DETECT

          - id: FN-005
            name: Sanitized input
            code: |
              let safe_name = sanitize(&name);
              execute(&format!("SELECT * FROM users WHERE name = '{}'", safe_name));
            expected: NO_DETECT

      edge_cases:
        count: 2
        tests:
          - id: EC-001
            name: Nested format calls
            code: |
              let id = format!("{}", user_id);
              let query = format!("SELECT * FROM users WHERE id = {}", id);
            expected: DETECT

          - id: EC-002
            name: Query built via macro
            code: |
              macro_rules! build_query {
                  ($t:expr) => { format!("SELECT * FROM {}", $t) }
              }
            expected: DETECT

      false_positive_regression:
        count: 3
        scenarios:
          - "Query using ? placeholder"
          - "Binary expression concatenating but not in database context"
          - "Function named query but receiving constant string"

