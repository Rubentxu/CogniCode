# Ansible Inventory - IaC fixture
# Production inventory

[webserver]
web-1 ansible_host=10.0.1.10 ansible_user=ubuntu
web-2 ansible_host=10.0.1.11 ansible_user=ubuntu
web-3 ansible_host=10.0.1.12 ansible_user=ubuntu

[app]
app-1 ansible_host=10.0.2.10 ansible_user=deploy
app-2 ansible_host=10.0.2.11 ansible_user=deploy
app-3 ansible_host=10.0.2.12 ansible_user=deploy

[database]
db-1 ansible_host=10.0.3.10 ansible_user=ubuntu
db-2 ansible_host=10.0.3.11 ansible_user=ubuntu

[webserver:vars]
ansible_python_interpreter=/usr/bin/python3
node_version=20.11.0

[app:vars]
ansible_python_interpreter=/home/deploy/venv/bin/python
app_port=8080
db_host=db-1.internal

[database:vars]
ansible_python_interpreter=/usr/bin/python3
db_admin_user=postgres
db_admin_password=secret123
db_app_user=cogniapp
db_app_password=appsecret456
db_name=cogniapp

[all:vars]
environment=production
app_version=2.1.0
deploy_user=deploy
