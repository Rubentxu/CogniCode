# App role tasks - Flask application deployment
- name: Install Python and pip
  package:
    name:
      - python3
      - python3-pip
      - python3-venv
    state: present

- name: Create application user
  user:
    name: "{{ deploy_user }}"
    system: yes
    create_home: yes
    shell: /bin/bash

- name: Clone application code
  git:
    repo: "{{ app_repo_url }}"
    dest: "/home/{{ deploy_user }}/app"
    version: "v{{ app_version }}"
    force: yes
  become: true
  become_user: "{{ deploy_user }}"

- name: Create virtual environment
  pip:
    virtualenv: "/home/{{ deploy_user }}/venv"
    virtualenv_command: python3 -m venv
  become: true
  become_user: "{{ deploy_user }}"

- name: Install Python dependencies
  pip:
    requirements: "/home/{{ deploy_user }}/app/requirements.txt"
    virtualenv: "/home/{{ deploy_user }}/venv"
  become: true
  become_user: "{{ deploy_user }}"

- name: Configure application environment
  template:
    src: app.env.j2
    dest: "/home/{{ deploy_user }}/.env"
    mode: '0600'
  become: true
  become_user: "{{ deploy_user }}"

- name: Create systemd service file
  template:
    src: app.service.j2
    dest: /etc/systemd/system/cogniapp.service
    mode: '0644'
  notify: Reload systemd

- name: Start application service
  systemd:
    name: cogniapp
    state: started
    enabled: true
    daemon_reload: yes
  become: true

  handlers:
    - name: Reload systemd
      systemd:
        daemon_reload: yes

    - name: Restart app
      systemd:
        name: cogniapp
        state: restarted
