# Call Graph - TypeScript: build_graph and call graph analysis tools
version: "2.0"
language: typescript
tier: A
description: "Test call graph tools on ts-hello fixture with ground truth"

timeout_seconds: 30

validation:
  failure_is_regression: true
  stages: []

scenarios:
  - name: build_graph_ts
    tool: build_graph
    action: build
    workspace: sandbox/fixtures/typescript/ts-hello
    scenario_class: read_only
    expected_outcome: pass
    description: "Build call graph for ts-hello fixture"
    arguments:
      directory: .
    ground_truth:
      edges: []
    metrics:
      correctness:
        type: edge_accuracy
        tolerance_pct: 0.05
      latency:
        target_ms: 500
        max_ms: 5000

  - name: entry_points_ts
    tool: get_entry_points
    action: find
    workspace: sandbox/fixtures/typescript/ts-hello
    scenario_class: read_only
    expected_outcome: pass
    description: "Find entry points in ts-hello fixture"
    arguments: {}
    ground_truth:
      entry_points:
        - name: greet
          kind: function
          location:
            file: hello.ts
            line: 5
            col: 0
        - name: add
          kind: function
          location:
            file: hello.ts
            line: 9
            col: 0
        - name: subtract
          kind: function
          location:
            file: hello.ts
            line: 13
            col: 0
    metrics:
      correctness:
        type: precision_recall
        tolerance_pct: 0.05
      latency:
        target_ms: 100
        max_ms: 500

  - name: leaf_functions_ts
    tool: get_leaf_functions
    action: find
    workspace: sandbox/fixtures/typescript/ts-hello
    scenario_class: read_only
    expected_outcome: pass
    description: "Find leaf functions in ts-hello fixture"
    arguments: {}
    ground_truth:
      leaf_functions:
        - name: greet
          kind: function
        - name: add
          kind: function
        - name: subtract
          kind: function
    metrics:
      correctness:
        type: precision_recall
        tolerance_pct: 0.05
      latency:
        target_ms: 100
        max_ms: 500

  - name: check_architecture_ts
    tool: check_architecture
    action: analyze
    workspace: sandbox/fixtures/typescript/ts-hello
    scenario_class: read_only
    expected_outcome: pass
    description: "Check architecture for cycles in ts-hello fixture"
    arguments: {}
    ground_truth:
      cycles: []
    metrics:
      correctness:
        type: structure_match
      latency:
        target_ms: 200
        max_ms: 1000

  - name: trace_path_ts
    tool: trace_path
    action: find
    workspace: sandbox/fixtures/typescript/ts-hello
    scenario_class: read_only
    expected_outcome: pass
    description: "Trace path from greet to add (no path expected)"
    arguments:
      source: greet
      target: add
      max_depth: 5
    ground_truth:
      paths:
        - source: greet
          target: add
          intermediates: []
          path_found: false
    metrics:
      correctness:
        type: structure_match
      latency:
        target_ms: 100
        max_ms: 500

  - name: hot_paths_ts
    tool: get_hot_paths
    action: find
    workspace: sandbox/fixtures/typescript/ts-hello
    scenario_class: read_only
    expected_outcome: pass
    description: "Find hot paths in ts-hello fixture"
    arguments:
      limit: 10
      min_fan_in: 1
    ground_truth:
      hot_functions: []
    metrics:
      correctness:
        type: recall@k
      latency:
        target_ms: 100
        max_ms: 500
