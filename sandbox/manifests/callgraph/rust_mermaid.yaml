# Call Graph Export Mermaid - Rust
version: "2.0"
language: rust
tier: A
description: "Test export_mermaid tool for Rust call graph"

timeout_seconds: 30

validation:
  failure_is_regression: true
  stages: []

scenarios:
  - name: export_mermaid_full_rust
    tool: export_mermaid
    action: export
    workspace: sandbox/fixtures/rust-callgraph
    scenario_class: read_only
    expected_outcome: pass
    description: "Export full call graph as mermaid"
    arguments:
      format: code
      max_depth: 3
    ground_truth:
      min_node_count: 5
      min_edge_count: 3
      mermaid_contains:
        - "flowchart TD"
        - "main --> helper"
        - "helper --> compute"
    metrics:
      correctness:
        type: recall
      latency:
        target_ms: 500
        max_ms: 2000
