version: '1.0'
language: cpp
tier: B
description: Tier B smoke tests for cpp using real OSS repo
timeout_seconds: 120
validation:
  failure_is_regression: false
  stages: []
scenarios:
- name: cpp_build_graph_json
  description: Build call graph for C++ (nlohmann/json) — parser + edge extraction
  workspace: .
  tool: build_graph
  action: build
  repo: cpp/json
  language: cpp
  scenario_class: read_only
  expected_outcome: pass
  arguments:
    directory: single_include
  ground_truth:
    symbols_min: 5
  metrics:
    latency:
      target_ms: 1000
      max_ms: 30000
- name: cpp_entry_points_json
  description: Find entry points in C++ (nlohmann/json) — class methods
  workspace: .
  tool: get_entry_points
  action: find
  repo: cpp/json
  language: cpp
  scenario_class: read_only
  expected_outcome: pass
  arguments: {}
  ground_truth:
    has_entry_points: true
    total_min: 1
  metrics:
    latency:
      target_ms: 500
      max_ms: 5000
- name: cpp_file_symbols_json
  description: Extract symbols from C++ header (json_fwd.hpp)
  workspace: .
  tool: get_file_symbols
  action: extract
  repo: cpp/json
  language: cpp
  scenario_class: read_only
  expected_outcome: pass
  arguments:
    file_path: single_include/nlohmann/json_fwd.hpp
  ground_truth:
    has_symbols: true
  metrics:
    latency:
      target_ms: 500
      max_ms: 5000
- name: cpp_leaf_functions_json
  description: Find leaf functions in cpp (json)
  tool: get_leaf_functions
  action: find
  repo: cpp/json
  language: cpp
  workspace: .
  scenario_class: read_only
  expected_outcome: pass
  pre_steps:
  - build_graph
  arguments: {}
  ground_truth:
    has_leaf_functions: true
    total_min: 1
  metrics:
    latency:
      target_ms: 200
      max_ms: 3000
- name: cpp_call_hierarchy_outgoing_json
  description: Find callees of basic_json::parse in cpp (json)
  tool: get_call_hierarchy
  action: callees
  repo: cpp/json
  language: cpp
  workspace: .
  scenario_class: read_only
  expected_outcome: pass
  pre_steps:
  - build_graph
  arguments:
    symbol_name: basic_json::parse
    direction: outgoing
    depth: 1
  ground_truth: {}
  metrics:
    latency:
      target_ms: 200
      max_ms: 3000
- name: cpp_analyze_impact_json
  description: Analyze impact of changing basic_json::parse in cpp (json)
  tool: analyze_impact
  action: analyze
  repo: cpp/json
  language: cpp
  workspace: .
  scenario_class: read_only
  expected_outcome: pass
  pre_steps:
  - build_graph
  arguments:
    symbol_name: basic_json::parse
  ground_truth: {}
  metrics:
    latency:
      target_ms: 200
      max_ms: 3000
- name: cpp_edit_file_comment_json
  description: Edit a comment in single_include/nlohmann/json_fwd.hpp (json) — safe mutation
  tool: edit_file
  action: apply
  repo: cpp/json
  language: cpp
  workspace: .
  scenario_class: mutation
  expected_outcome: pass
  arguments:
    path: README.md
    old_text: '[![JSON for Modern C++](docs/json.gif)](https://github.com/nlohmann/json/releases)'
    new_text: '[![JSON for Modern C++ — CogniCode sandbox](docs/json.gif)](https://github.com/nlohmann/json/releases)'
    file_path: single_include/nlohmann/json.hpp
  metrics:
    latency:
      target_ms: 1000
      max_ms: 10000
- name: cpp_write_file_new_json
  description: Create a new file in json — write_file
  tool: write_file
  action: create
  repo: cpp/json
  language: cpp
  workspace: .
  scenario_class: mutation
  expected_outcome: pass
  arguments:
    path: .cognicode-test.txt
    content: 'CogniCode sandbox test — auto-generated, safe to delete

      '
  metrics:
    latency:
      target_ms: 200
      max_ms: 2000
