version: '1.0'
language: php
tier: B
description: Tier B smoke tests for php using real OSS repo
timeout_seconds: 120
validation:
  failure_is_regression: false
  stages: []
scenarios:
- name: php_build_graph_slim
  description: Build call graph for PHP (slim) — parser + edge extraction
  workspace: .
  tool: build_graph
  action: build
  repo: php/slim
  language: php
  scenario_class: read_only
  expected_outcome: pass
  arguments:
    directory: Slim
  ground_truth:
    symbols_min: 5
  metrics:
    latency:
      target_ms: 500
      max_ms: 10000
- name: php_entry_points_slim
  description: Find entry points in PHP (slim) — top-level functions
  workspace: .
  tool: get_entry_points
  action: find
  repo: php/slim
  language: php
  scenario_class: read_only
  expected_outcome: expected_fail
  arguments: {}
  ground_truth:
    has_entry_points: true
    total_min: 1
  metrics:
    latency:
      target_ms: 200
      max_ms: 2000
- name: php_file_symbols_slim
  description: Extract symbols from a PHP file (App.php)
  workspace: .
  tool: get_file_symbols
  action: extract
  repo: php/slim
  language: php
  scenario_class: read_only
  expected_outcome: pass
  arguments:
    file_path: Slim/App.php
  ground_truth:
    has_symbols: true
  metrics:
    latency:
      target_ms: 300
      max_ms: 3000
- name: php_leaf_functions_slim
  description: Find leaf functions in php (slim)
  tool: get_leaf_functions
  action: find
  repo: php/slim
  language: php
  workspace: .
  scenario_class: read_only
  expected_outcome: expected_fail
  pre_steps:
  - build_graph
  arguments: {}
  ground_truth:
    has_leaf_functions: true
    total_min: 1
  metrics:
    latency:
      target_ms: 200
      max_ms: 3000
- name: php_call_hierarchy_outgoing_slim
  description: Find callees of Slim\App in php (slim)
  tool: get_call_hierarchy
  action: callees
  repo: php/slim
  language: php
  workspace: .
  scenario_class: read_only
  expected_outcome: pass
  pre_steps:
  - build_graph
  arguments:
    symbol_name: Slim\App
    direction: outgoing
    depth: 1
  ground_truth: {}
  metrics:
    latency:
      target_ms: 200
      max_ms: 3000
- name: php_analyze_impact_slim
  description: Analyze impact of changing Slim\App in php (slim)
  tool: analyze_impact
  action: analyze
  repo: php/slim
  language: php
  workspace: .
  scenario_class: read_only
  expected_outcome: pass
  pre_steps:
  - build_graph
  arguments:
    symbol_name: Slim\App
  ground_truth: {}
  metrics:
    latency:
      target_ms: 200
      max_ms: 3000
- name: php_edit_file_comment_slim
  description: Edit a comment in Slim/App.php (slim) — safe mutation
  tool: edit_file
  action: apply
  repo: php/slim
  language: php
  workspace: .
  scenario_class: mutation
  expected_outcome: pass
  arguments:
    path: Slim/App.php
    old_text: namespace Slim;
    new_text: namespace Slim; // CogniCode sandbox
  metrics:
    latency:
      target_ms: 1000
      max_ms: 10000
- name: php_write_file_new_slim
  description: Create a new file in slim — write_file
  tool: write_file
  action: create
  repo: php/slim
  language: php
  workspace: .
  scenario_class: mutation
  expected_outcome: pass
  arguments:
    path: .cognicode-test.txt
    content: 'CogniCode sandbox test — auto-generated, safe to delete

      '
  metrics:
    latency:
      target_ms: 200
      max_ms: 2000
