  scenario_class: read_only
  expected_outcome: pass
  description: Find usages of Calculator struct
  arguments:
    file_path: src/lib.rs
    symbol_name: Calculator
  ground_truth:
    usages:
    - file: src/lib.rs
      line: 27
      col: 11
      context: "pub struct Calculator {"
    - file: src/lib.rs
      line: 31
      col: 5
      context: "impl Calculator {"
    - file: src/lib.rs
      line: 34
      col: 8
      context: "Calculator { value: initial }"
  metrics:
    correctness:
      type: precision_recall
      tolerance_pct: 0.05
    latency:
      target_ms: 100
      max_ms: 500
