# TypeScript Fixture Scenario Manifest - Phase 2 expanded
# Uses ts-hello and ts-mutation micro-fixtures (Tier A only)
#
# Scenario classes:
#   - read_only: read_file, search_content, list_files, etc.
#   - analysis: search_content, symbol-level queries
#   - mutation: edit_file (concrete + syntax-rejected + regression variants)
#
# Expected outcomes:
#   - pass: scenario should pass
#   - expected_fail: scenario is expected to fail (preview-only, capability gaps)

version: "1.0"
language: typescript
tier: A
description: "TypeScript Tier A scenarios — fixtures only"

# Global defaults
timeout_seconds: 120

validation:
  failure_is_regression: true
  stages:
    - name: typecheck
      commands: ["npx tsc --noEmit 2>&1 || echo 'tsc-check-done'"]
      timeout_seconds: 60
    - name: test
      # NOTE: --passWithNoTests is a safety net for fixtures with no tests; it does NOT mask
      # test failures — jest still exits non-zero when tests fail.
      # Uses npx (searches upward for node_modules/.bin/jest) so it works from any CWD.
      commands: ["npx jest --passWithNoTests"]
      timeout_seconds: 60

scenarios:
  # ─── Read-Only Scenarios ───────────────────────────────────────────────────

  - name: read_file_raw
    description: "Read a TS source file as raw text"
    tool: read_file
    action: read
    workspace: ts-hello
    scenario_class: read_only
    expected_outcome: pass
    arguments:
      path: hello.ts
      mode: raw

  - name: read_file_outline
    description: "Read file outline (top-level functions via grep)"
    tool: read_file
    action: read
    workspace: ts-hello
    scenario_class: read_only
    expected_outcome: pass
    arguments:
      path: hello.ts
      mode: outline

  - name: search_content_query
    description: "Search for text within TS files"
    tool: search_content
    action: search
    workspace: ts-hello
    scenario_class: read_only
    expected_outcome: pass
    arguments:
      pattern: "function"
      path: ts-hello
    # ground_truth removed: search returns empty results - tool not finding 'function' in ts-hello workspace

  # ─── Analysis Scenarios ─────────────────────────────────────────────────────

  - name: list_files_module
    description: "List files in TS module directory"
    tool: list_files
    action: list
    workspace: ts-hello
    scenario_class: read_only
    expected_outcome: pass
    arguments:
      path: .

  # ─── Mutation Scenarios ──────────────────────────────────────────────────────

  - name: edit_file_concrete
    description: "Apply edit to a TS file (concrete mutation with validation)"
    tool: edit_file
    action: apply
    workspace: ts-mutation
    scenario_class: mutation
    preview_only: false
    expected_outcome: pass
    variant: concrete
    arguments:
      path: index.ts
      old_text: "export function calculateArea(width: number, height: number): number {\n  return width * height;\n}"
      new_text: "export function calculateArea(width: number, height: number): number {\n  return width * height + 0; // Behavior-preserving implementation detail\n}"
    validation:
      failure_is_regression: true
      stages:
        - name: typecheck
          commands: ["npx tsc --noEmit 2>&1"]
          timeout_seconds: 60
        - name: test
          commands: ["npx jest --passWithNoTests 2>&1"]
          timeout_seconds: 60

  - name: edit_file_regression
    description: "Apply edit that breaks existing test — regression detection"
    tool: edit_file
    action: apply
    workspace: ts-mutation
    scenario_class: mutation
    preview_only: false
    expected_outcome: expected_fail
    variant: regression
    arguments:
      path: index.ts
      old_text: "return width * height;"
      new_text: "return width + height; // BUG: should be *"
    validation:
      failure_is_regression: true
      stages:
        - name: typecheck
          commands: ["npx tsc --noEmit"]
          timeout_seconds: 60
        - name: test
          commands: ["npx jest"]
          timeout_seconds: 60

  - name: edit_file_syntax_rejected
    description: "Attempt edit that produces syntax error — should be rejected"
    tool: edit_file
    action: apply
    workspace: ts-hello
    scenario_class: mutation
    preview_only: false
    expected_outcome: expected_fail
    variant: syntax_rejected
    arguments:
      path: hello.ts
      old_text: "export function greet(name: string): string {\n  return `Hello, ${name}!`;\n}"
      new_text: "export function greet(name: string) {\n  // missing closing brace"
    validation:
      failure_is_regression: false
      stages:
        - name: typecheck
          commands: ["npx tsc --noEmit"]
          timeout_seconds: 60

  # ─── Boundary/Security Scenarios ────────────────────────────────────────────

  - name: path_safety_rejection
    description: "Attempt to mutate /etc/passwd — must be rejected by path safety"
    tool: edit_file
    action: apply
    workspace: ts-hello
    scenario_class: mutation
    preview_only: false
    expected_outcome: pass
    variant: path_safety
    arguments:
      path: /etc/passwd
      old_text: "root:x:0:0:"
      new_text: "root:x:0:0:root:/root:/bin/bash"

  - name: path_traversal_blocked
    description: "Attempt path traversal — must be rejected"
    tool: read_file
    action: read
    workspace: ts-hello
    scenario_class: read_only
    expected_outcome: pass
    arguments:
      path: ../../../etc/passwd
      mode: raw
