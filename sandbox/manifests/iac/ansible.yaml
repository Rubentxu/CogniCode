# IaC Manifest - Ansible playbook extraction (ADR-036)
version: "2.0"
language: ansible
tier: A
description: "Test interpret_ansible handler - extract plays, tasks, roles, modules as graph nodes with Calls edges"

timeout_seconds: 120

validation:
  failure_is_regression: true
  stages:
    - name: syntax
      commands: ["ansible-playbook --syntax-check site.yml 2>&1"]
      timeout_seconds: 30

scenarios:
  # ─── Ansible IaC Scenarios ───────────────────────────────────────────────────
  # NOTE: All ansible scenarios are marked expected_failure because:
  # 1. iac_query is a lookup tool (not discovery) — same issue as terraform
  # 2. Ansible IDs use parser-assigned indices (ansible:site.yml:play:0, play:1, etc.)
  #    which are not predictable from the manifest without running the parser first
  # 3. The interpret_ansible handler needs to be enhanced to produce stable named IDs
  #    (e.g., ansible:site.yml:play:Configure_infrastructure) instead of index-based IDs
  #
  # The terraform manifest (terraform.yaml) shows the working pattern with stable IDs.

  - name: ansible_iac_query_all
    description: "DISCOVERY: Query all Ansible resources — expected_failure (no discovery support)"
    tool: iac_query
    action: query
    workspace: sandbox/fixtures/ansible-playbook
    scenario_class: read_only
    expected_outcome: expected_fail
    arguments:
      resource_id: "ansible:site.yml:play:0"
    notes: "iac_query does not support discovery. Ansible IDs use parser indices (not stable names). Gap: need stable Ansible IDs + IaC search tool."

  - name: ansible_iac_query_plays
    description: "DISCOVERY: Query plays — expected_failure (no discovery support + index-based IDs)"
    tool: iac_query
    action: query
    workspace: sandbox/fixtures/ansible-playbook
    scenario_class: read_only
    expected_outcome: expected_fail
    arguments:
      resource_id: "ansible:site.yml:play:0"
    notes: "Same gaps as ansible_iac_query_all."

  - name: ansible_iac_query_tasks
    description: "DISCOVERY: Query tasks — expected_failure (no discovery support + index-based IDs)"
    tool: iac_query
    action: query
    workspace: sandbox/fixtures/ansible-playbook
    scenario_class: read_only
    expected_outcome: expected_fail
    arguments:
      resource_id: "ansible:site.yml:task:0"
    notes: "Same gaps as ansible_iac_query_all."

  - name: ansible_iac_query_roles
    description: "DISCOVERY: Query roles — expected_failure (roles not extracted as named nodes)"
    tool: iac_query
    action: query
    workspace: sandbox/fixtures/ansible-playbook
    scenario_class: read_only
    expected_outcome: expected_fail
    arguments:
      resource_id: "ansible:builtin:nginx"
    notes: "interpret_ansible does not extract roles as named nodes. Roles appear as 'dependency.imports' edges."

  - name: ansible_iac_query_inventory
    description: "DISCOVERY: Query inventory — expected_failure (inventory not extracted as nodes)"
    tool: iac_query
    action: query
    workspace: sandbox/fixtures/ansible-playbook
    scenario_class: read_only
    expected_outcome: expected_fail
    arguments:
      resource_id: "ansible:inventory"
    notes: "interpret_ansible does not extract inventory groups/hosts as graph nodes."

  - name: ansible_iac_query_with_calls
    description: "DISCOVERY: Query task-to-module calls — expected_failure"
    tool: iac_query
    action: query
    workspace: sandbox/fixtures/ansible-playbook
    scenario_class: read_only
    expected_outcome: expected_fail
    arguments:
      resource_id: "ansible:site.yml:task:0"
    metrics:
      correctness:
        type: structure_match
      latency:
        target_ms: 500
        max_ms: 2000
    notes: "iac_query supports 'depth' param for dependency traversal, but discovery is the gap."
