version: '1.0'
language: tierc
tier: C
description: Tier C parser smoke tests for remaining 15 languages
timeout_seconds: 60
validation:
  failure_is_regression: false
  stages: []
scenarios:
- name: tierc_lua_build_graph
  description: Build graph from lua fixture (Tier C)
  tool: build_graph
  action: build
  workspace: .
  language: lua
  scenario_class: read_only
  expected_outcome: pass
  arguments:
    directory: .
  ground_truth: {}
  metrics:
    latency:
      target_ms: 500
      max_ms: 10000
- name: tierc_lua_file_symbols
  description: Extract symbols from lua file
  tool: get_file_symbols
  action: extract
  workspace: .
  language: lua
  scenario_class: read_only
  expected_outcome: pass
  arguments:
    file_path: main.lua
  ground_truth: {}
  metrics:
    latency:
      target_ms: 200
      max_ms: 3000
