# Indexing - TypeScript: build_lightweight_index, query_symbol_index
version: "2.0"
language: typescript
tier: A
description: "Test indexing tools on ts-indexing fixture with ground truth"

timeout_seconds: 30

validation:
  failure_is_regression: true
  stages: []

scenarios:
  - name: build_lightweight_index_ts
    tool: build_lightweight_index
    action: build
    workspace: sandbox/fixtures/ts-indexing
    scenario_class: read_only
    expected_outcome: pass
    description: "Build lightweight index for ts-indexing fixture"
    arguments:
      directory: .
      strategy: lightweight
    ground_truth:
      indexed_symbols:
        - name: greet
          kind: function
          location:
            file: index.ts
            line: 13
            col: 7
        - name: farewell
          kind: function
          location:
            file: index.ts
            line: 17
            col: 7
        - name: Calculator
          kind: class
          location:
            file: index.ts
            line: 21
            col: 7
        - name: process
          kind: function
          location:
            file: index.ts
            line: 37
            col: 7
        - name: formatResult
          kind: function
          location:
            file: utils.ts
            line: 9
            col: 7
        - name: validateInput
          kind: function
          location:
            file: utils.ts
            line: 13
            col: 7
    metrics:
      correctness:
        type: index_completeness
        tolerance_pct: 0.1
      latency:
        target_ms: 200
        max_ms: 1000

  - name: query_symbol_index_ts_greet
    tool: query_symbol_index
    action: query
    workspace: sandbox/fixtures/ts-indexing
    scenario_class: read_only
    expected_outcome: pass
    description: "Query for 'greet' symbol in ts-indexing fixture"
    arguments:
      symbol_name: greet
      directory: .
    ground_truth:
      query_results:
        - symbol_name: greet
          locations:
            - file: index.ts
              line: 13
              col: 7
    metrics:
      correctness:
        type: recall@k
        tolerance_pct: 0.05
      latency:
        target_ms: 50
        max_ms: 200

  - name: query_symbol_index_ts_calculator
    tool: query_symbol_index
    action: query
    workspace: sandbox/fixtures/ts-indexing
    scenario_class: read_only
    expected_outcome: pass
    description: "Query for 'Calculator' class in ts-indexing fixture"
    arguments:
      symbol_name: Calculator
      directory: .
    ground_truth:
      query_results:
        - symbol_name: Calculator
          locations:
            - file: index.ts
              line: 21
              col: 7
    metrics:
      correctness:
        type: recall@k
        tolerance_pct: 0.05
      latency:
        target_ms: 50
        max_ms: 200
