        memory_breakpoint_kb: 16384

  # ─── Call Graph: get_call_hierarchy ────────────────────────────────
  - name: get_call_hierarchy_1kb
    tool: get_call_hierarchy
    action: trace
    workspace: sandbox/fixtures/scale/rust/scale_1kb
    scenario_class: analysis
    expected_outcome: pass
    description: "Get call hierarchy for 1KB workspace"
    arguments:
      symbol_name: "compute_all"
      direction: "outgoing"
      depth: 3
    metrics:
      latency:
        target_ms: 50
        max_ms: 300
