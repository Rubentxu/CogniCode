        max_ms: 500
      scalability:
        classification: linear
        breakpoint_kb: 10
        memory_breakpoint_kb: 2048

  - name: get_call_hierarchy_100kb
    tool: get_call_hierarchy
    action: trace
    workspace: sandbox/fixtures/scale/rust/scale_100kb
    scenario_class: analysis
    expected_outcome: pass
    description: "Get call hierarchy for 100KB workspace"
    arguments:
      symbol_name: "compute_all"
      direction: "outgoing"
      depth: 3
    metrics:
      latency:
        target_ms: 200
        max_ms: 1000
      scalability:
        classification: linear
        breakpoint_kb: 100
        memory_breakpoint_kb: 8192

  - name: get_call_hierarchy_1mb
    tool: get_call_hierarchy
    action: trace
    workspace: sandbox/fixtures/scale/rust/scale_1mb
    scenario_class: analysis
    expected_outcome: pass
    description: "Get call hierarchy for 1MB workspace"
    arguments:
      symbol_name: "compute_all"
      direction: "outgoing"
      depth: 3
    metrics:
      latency:
        target_ms: 500
        max_ms: 3000
      scalability:
        classification: linear
        breakpoint_kb: 1024
        memory_breakpoint_kb: 16384

  # ─── Indexing: build_lightweight_index ──────────────────────────────
  - name: build_lightweight_index_1kb
    tool: build_lightweight_index
    action: index
    workspace: sandbox/fixtures/scale/rust/scale_1kb
    scenario_class: analysis
    expected_outcome: pass
    description: "Build lightweight index for 1KB workspace"
    arguments:
      directory: "."
    ground_truth:
      indexed_symbols:
        - name: compute_all
          kind: function
        - name: compute_1
          kind: function
        - name: Item1
          kind: struct
    metrics:
      correctness:
        type: precision_recall
      latency:
        target_ms: 100
