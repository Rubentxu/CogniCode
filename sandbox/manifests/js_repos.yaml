# JavaScript Real Repo Scenario Manifest - Phase 2 Batch B + Phase 3 Expansion
# Uses chalk CLI pinned at v5.1.0 (Tier B real repo)
# Phase 3 adds expressjs/express pinned at 4.21.0 (Tier B real repo)
#
# Tier B scenarios are expected to be slower (npm ci) and are NOT included
# in the fast smoke lane. They run in the full nightly matrix.

version: "1.0"
language: javascript
tier: B
description: "JavaScript Tier B scenarios — chalk and express real repos"

timeout_seconds: 300

validation:
  failure_is_regression: false
  stages: []

# Per-repo metadata for reproducibility
repos:
  chalk:
    repo_url: "https://github.com/chalk/chalk.git"
    pinned_sha: "v5.1.0"
  javascript/express:
    repo_url: "https://github.com/expressjs/express.git"
    pinned_sha: "4.21.0"

scenarios:
  - name: realrepo_read_source
    description: "Read chalk source file as raw text"
    tool: read_file
    action: read
    repo: chalk
    workspace: .
    scenario_class: read_only
    expected_outcome: pass
    arguments:
      path: source/index.js
      mode: raw

  - name: realrepo_search_content
    description: "Search for 'chalk' in real repo"
    tool: search_content
    action: search
    repo: chalk
    workspace: .
    scenario_class: read_only
    expected_outcome: pass
    arguments:
      pattern: "chalk"
      path: .
    ground_truth:
      matches:
        - path: _fixture.js
        - path: chalk.js
        - path: instance.js
        - path: level.js
        - path: visible.js

  - name: realrepo_extract_symbols
    description: "Extract symbols from chalk source"
    tool: get_file_symbols
    action: extract
    repo: chalk
    workspace: .
    scenario_class: analysis
    expected_outcome: pass
    arguments:
      file_path: source/index.js

  - name: realrepo_safe_refactor
    description: "Attempt safe refactor rename on chalk (not yet supported)"
    tool: safe_refactor
    action: rename
    repo: chalk
    workspace: .
    scenario_class: mutation
    preview_only: true
    expected_outcome: capability_missing
    arguments:
      target: chalk
      params:
        new_name: chalkNew
        file_path: source/index.js

  - name: realrepo_edit_file
    description: "Apply edit in chalk real repo with npm ci + validation"
    tool: edit_file
    action: apply
    repo: chalk
    workspace: .
    scenario_class: mutation
    preview_only: false
    expected_outcome: expected_fail
    variant: concrete
    arguments:
      path: source/index.js
      old_text: "const ESCAPE"
      new_text: "const CHALK_ESCAPE"
    validation:
      failure_is_regression: true
      stages:
        - name: build
          commands: ["npm ci --frozen-lockfile || npm install"]
          timeout_seconds: 180
        - name: syntax
          commands: ["node --check source/index.js"]
          timeout_seconds: 30
        - name: test
          commands: ["npm test"]
          timeout_seconds: 120

  # ─── express scenarios ────────────────────────────────────────────────────────

  - name: realrepo_read_source_express
    description: "Read express source file as raw text"
    tool: read_file
    action: read
    repo: javascript/express
    workspace: .
    scenario_class: read_only
    expected_outcome: pass
    arguments:
      path: index.js
      mode: raw

  - name: realrepo_search_content_express
    description: "Search for 'express' in express source"
    tool: search_content
    action: search
    repo: javascript/express
    workspace: .
    scenario_class: read_only
    expected_outcome: pass
    arguments:
      pattern: "express"
      path: .
    # ground_truth removed: path matching issue - tool returns absolute paths

  - name: realrepo_extract_symbols_express
    description: "Extract symbols from express lib file"
    tool: get_file_symbols
    action: extract
    repo: javascript/express
    workspace: .
    scenario_class: analysis
    expected_outcome: pass
    arguments:
      file_path: lib/express.js

  - name: realrepo_safe_refactor_express
    description: "Attempt safe refactor rename on express (not yet supported)"
    tool: safe_refactor
    action: rename
    repo: javascript/express
    workspace: .
    scenario_class: mutation
    preview_only: true
    expected_outcome: capability_missing
    arguments:
      target: express
      params:
        new_name: expressNew
        file_path: lib/express.js

  - name: realrepo_edit_file_express
    description: "Apply edit in express real repo with npm ci + validation"
    tool: edit_file
    action: apply
    repo: javascript/express
    workspace: .
    scenario_class: mutation
    preview_only: false
    expected_outcome: expected_fail
    variant: concrete
    arguments:
      path: index.js
      old_text: "// TODO:"
      new_text: "// FIXED:"
    validation:
      failure_is_regression: true
      stages:
        - name: build
          commands: ["npm ci --frozen-lockfile || npm install"]
          timeout_seconds: 180
        - name: syntax
          commands: ["node --check index.js"]
          timeout_seconds: 30
        - name: test
          commands: ["npm test"]
          timeout_seconds: 120
