  - name: edit_file_comment_concrete
    description: "Apply a safe comment edit to go-hello/hello.go (concrete mutation with validation)"
    tool: edit_file
    action: apply
    workspace: sandbox/fixtures/go-hello
    scenario_class: mutation
    preview_only: false
    expected_outcome: pass
    variant: concrete
    arguments:
      path: hello.go
      old_text: "// Package main provides a simple example Go module for CogniCode sandbox testing."
      new_text: "// Package main provides a simple example Go module for CogniCode sandbox testing (updated)."
    validation:
      failure_is_regression: true
      stages:
        - name: build
          commands: ["go build ./..."]
          timeout_seconds: 60
        - name: test
          commands: ["go test ./..."]
          timeout_seconds: 60

  - name: edit_file_syntax_rejected
    description: "Attempt edit that produces a syntax error — should be rejected or fail validation"
    tool: edit_file
    action: apply
    workspace: sandbox/fixtures/go-hello
    scenario_class: mutation
    preview_only: false
    expected_outcome: expected_fail
    variant: syntax_rejected
    arguments:
      path: hello.go
      old_text: "func Add(a, b int) int {"
      new_text: "func Add(a, b int) int { SYNTAX_ERROR"
    validation:
      failure_is_regression: false
      stages:
        - name: build
          commands: ["go build ./..."]
          timeout_seconds: 30

