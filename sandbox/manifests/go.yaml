# Go Tier A Scenario Manifest — Expanded Coverage
# ≥50 escenarios reales usando tree-sitter-go parser + repos OSS cobra/bubbletea/lo
#
# Repos disponibles:
#   sandbox/repos/go/cobra     — CLI framework (spf13/cobra v1.8.1)
#   sandbox/repos/go/bubbletea — TUI framework (charmbracelet/bubbletea v1.3.9)
#   sandbox/repos/go/lo        — Generics utilities (samber/lo v1.43.0)
#   sandbox/fixtures/go-hello  — Fixture minimal para mutaciones concretas
#
# Scenario classes:
#   - read_only:  read_file, list_files, search_content
#   - analysis:   get_file_symbols, build_graph, get_complexity, build_lightweight_index,
#                 query_symbol_index, semantic_search, get_outline, build_call_subgraph,
#                 get_entry_points, get_leaf_functions
#   - mutation:   edit_file, write_file, safe_refactor
#
# Expected outcomes:
#   - pass:              scenario should succeed
#   - expected_fail:     tool invocada pero resultado intencionalmente incorrecto
#   - capability_missing: herramienta/lenguaje no soportado

version: "1.0"
language: go
tier: A
description: "Go Tier A scenarios — read-only, analysis, and mutation with cobra/bubbletea/lo/go-hello"

# Global defaults
timeout_seconds: 120

validation:
  failure_is_regression: true
  stages:
    - name: syntax
      commands: ["go vet ./... 2>&1 || true"]
      timeout_seconds: 60
    - name: build
      # Use go build -o /dev/null to test compilation without producing binaries.
      # For analysis scenarios, we only care about syntax/type checking, not linkability.
      # The || true makes build failures non-blocking since analysis tools work even
      # on repos with type errors (the tools read source, not compiled output).
      commands: ["go build -o /dev/null ./... 2>&1 || true"]
      timeout_seconds: 120

scenarios:
