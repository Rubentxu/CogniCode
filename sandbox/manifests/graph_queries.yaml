version: '1.0'
language: rust
tier: A
description: Graph Query Smoke Tests — Graphify-style comprehensive validation
timeout_seconds: 300
validation:
  failure_is_regression: true
  stages:
  - name: syntax
    commands:
    - cargo check
    expected_exit_range:
    - 0
    - 0
    timeout_seconds: 60
scenarios:
- name: query_build_graph_rust
  description: Build call graph from Rust fixture
  tool: build_graph
  action: build
  workspace: sandbox/fixtures/rust-callgraph
  scenario_class: read_only
  expected_outcome: pass
  arguments:
    directory: .
  ground_truth:
    symbols_min: 5
    relationships_min: 3
  metrics:
    latency:
      target_ms: 200
      max_ms: 2000
- name: query_build_graph_python
  description: Build call graph from Python fixture — cross-language
  tool: build_graph
  action: build
  workspace: sandbox/fixtures/rust-callgraph
  scenario_class: read_only
  expected_outcome: pass
  arguments:
    directory: .
  ground_truth:
    symbols_min: 5
    relationships_min: 3
  metrics:
    latency:
      target_ms: 200
      max_ms: 2000
- name: query_entry_points_rust
  description: Find entry points — expects main as root
  tool: get_entry_points
  action: find
  workspace: sandbox/fixtures/rust-callgraph
  scenario_class: read_only
  expected_outcome: pass
  arguments: {}
  ground_truth:
    has_entry_points: true
    total_min: 1
    contains_main: true
  metrics:
    latency:
      target_ms: 100
      max_ms: 1000
- name: query_entry_points_python
  description: Find entry points in Python
  tool: get_entry_points
  action: find
  workspace: sandbox/fixtures/rust-callgraph
