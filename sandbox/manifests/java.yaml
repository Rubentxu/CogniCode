  - name: edit_file_comment_concrete
    description: "Apply a safe comment edit to java-hello/Greeter.java (concrete mutation)"
    tool: edit_file
    action: apply
    workspace: sandbox/fixtures/java-hello
    scenario_class: mutation
    preview_only: false
    expected_outcome: pass
    variant: concrete
    arguments:
      path: src/main/java/hello/Greeter.java
      old_text: "* A simple greeting class for CogniCode sandbox testing."
      new_text: "* A simple greeting class for CogniCode sandbox testing (updated)."
    validation:
      failure_is_regression: true
      stages:
        - name: syntax
          commands: ["javac src/main/java/hello/Greeter.java -d /tmp/sandbox-java-hello 2>&1"]
          timeout_seconds: 30

  - name: edit_file_syntax_rejected
    description: "Attempt edit that produces Java syntax error — should fail validation"
    tool: edit_file
    action: apply
    workspace: sandbox/fixtures/java-hello
    scenario_class: mutation
    preview_only: false
    expected_outcome: expected_fail
    variant: syntax_rejected
    arguments:
      path: src/main/java/hello/Greeter.java
      old_text: "public int add(int a, int b) {"
      new_text: "public int add(int a, int b) { SYNTAX_ERROR"
    validation:
      failure_is_regression: false
      stages:
        - name: syntax
          commands: ["javac src/main/java/hello/Greeter.java -d /tmp/sandbox-java-hello"]
          timeout_seconds: 30

