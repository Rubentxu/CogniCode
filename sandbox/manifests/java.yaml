# Java Tier A Scenario Manifest — Expanded Coverage
# ≥50 escenarios reales usando tree-sitter-java parser + spring-petclinic + java-sample/java-hello
#
# Repos disponibles:
#   sandbox/repos/java/spring-petclinic  — Spring Boot app (spring-projects/spring-petclinic)
#   sandbox/fixtures/java-sample         — Fixture minimal Calculator.java
#   sandbox/fixtures/java-hello          — Fixture Greeter.java para mutaciones concretas
#
# Scenario classes:
#   - read_only:  read_file, list_files, search_content
#   - analysis:   get_file_symbols, build_graph, get_complexity, build_lightweight_index,
#                 query_symbol_index, semantic_search, get_outline, build_call_subgraph,
#                 get_entry_points, get_leaf_functions
#   - mutation:   edit_file, write_file, safe_refactor
#
# Expected outcomes:
#   - pass:              scenario should succeed
#   - expected_fail:     tool invocada pero resultado intencionalmente incorrecto
#   - capability_missing: herramienta/lenguaje no soportado

version: "1.0"
language: java
tier: A
description: "Java Tier A scenarios — read-only, analysis, and mutation with spring-petclinic/java-sample/java-hello"

# Global defaults
timeout_seconds: 120

validation:
  failure_is_regression: true
  stages:
    - name: syntax
      commands: ["javac --version 2>&1"]
      timeout_seconds: 30
    - name: build
      commands: ["javac -cp . src/main/java/sample/Calculator.java -d /tmp/sandbox-java 2>&1 || true"]
      timeout_seconds: 60

# Shorthand path prefix for spring-petclinic Java sources
# Full path: src/main/java/org/springframework/samples/petclinic/<package>/<File>.java

