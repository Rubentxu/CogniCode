    tool: write_file
    action: create
    workspace: sandbox/fixtures/java-hello
    scenario_class: mutation
    preview_only: false
    expected_outcome: pass
    variant: concrete
    arguments:
      path: src/main/java/hello/MathUtils.java
      content: "package hello;\n\n/**\n * Simple math utility class.\n */\npublic class MathUtils {\n    public static int max(int a, int b) {\n        return a > b ? a : b;\n    }\n}\n"
    validation:
